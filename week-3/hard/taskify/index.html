<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1 class="app-heading">Taskify</h1>
        <p>Add your tasks in the category you want. You can drag and drop them later.</p>
    </div>
    <div class="all-tasks">
        <div class="todo">
            <button class="addNew">Add New (+)</button>
        </div>
        <div class="in-progress">
            <button class="addNew">Add New (+)</button>
        </div>
        <div class="under-review">
            <button class="addNew">Add New (+)</button>
        </div>
        <div class="finished">
            <button class="addNew">Add New (+)</button>
        </div>
    </div>
</body>
</html>
