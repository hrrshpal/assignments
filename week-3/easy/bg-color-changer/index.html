<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="color-panel">
        <button id="red-btn" style="background-color: red;">Red</button>
        <button id="yellow-btn" style="background-color: yellow; color:black">Yellow</button>
        <button id="black-btn" style="background-color: black;">Black</button>
        <button id="purple-btn" style="background-color: purple;">Purple</button>
        <button id="green-btn" style="background-color: green;">Green</button>
        <button id="blue-btn" style="background-color: blue;">Blue</button>
        <button id="default-btn" style="background-color: peachpuff; color:black">Default</button>
        <div id="user-choice">
            <input id="colorInput" type="text"> <button id="user-btn" style="background-color: white; color:black; border: 2px solid black; padding:0px 10px;">Change BG</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
